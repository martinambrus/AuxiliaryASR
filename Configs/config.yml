log_dir: "Checkpoint"
save_freq: 10
device: "cuda"
epochs: 200
batch_size: 64
pretrained_model: ""
load_only_params: false
train_data: "Data/train_list.txt"
val_data: "Data/val_list.txt"
ood_data: "Data/OOD_texts.txt"
phoneme_maps_path: "Data/word_index_dict.txt"

preprocess_parasm:
  sr: 24000
  spect_params:
    n_fft: 1024
    win_length: 1024
    hop_length: 300
  mel_params:
    n_mels: 80

model_params:
   input_dim: 80
   hidden_dim: 256
   token_embedding_dim: 512
   n_layers: 5
   location_kernel_size: 31

optimizer_params:
  lr: 0.0005
  pct_start: 0.1

# this is a very basic early stopping based off learning rate - when it falls to 0 and remains there for 3 epochs, the training stops
enable_early_stopping: True

# for more stable learning, first X epochs should be trained with audio files of similar lengths grouped together
# this option determines epoch during which the sorted dataset will be swapped for a shuffled one
# default: 10
sortagrad_switch_to_shuffled_dataset_epoch: 10

# make ASR learn to read phonemes from left to right, not randomly
use_diagonal_attention_prior: True
diagonal_attention_prior_weight: 0.1

# stabilizes ASR training for smaller datasets
entropy_params:
  label_smoothing: 0.1

dataset_params:
  # SpecAugment parameters applied only on the training split.
  spec_augment:
    apply_prob: 0.5
    freq_mask_param: 13
    time_mask_param: 50
    num_freq_masks: 2
    num_time_masks: 2

dataloader_params:
  train_num_workers: 8
  val_num_workers: 2
  train_bucket_sampler:
    enabled: true
    bucket_size_multiplier: 20  # bucket = batch_size * multiplier
    shuffle_within_bucket: true
    shuffle_batches: true

loss_weights:
  ctc: 0.8
  s2s: 1.0

ssl_frontend:
  enabled: false
  # Toggle individual pretrained encoders below. The first enabled entry
  # determines which encoder configuration will be used when
  # ``ssl_frontend.enabled`` is true. Leave all disabled to rely on the
  # default mel-spectrogram front-end.
  wav2vec2:
    enabled: false
    pretrained_model_name: "facebook/wav2vec2-base"
  hubert:
    enabled: false
    pretrained_model_name: "facebook/hubert-base-ls960"
  wavlm:
    enabled: false
    pretrained_model_name: "microsoft/wavlm-base"
  xlsr:
    enabled: false
    pretrained_model_name: "facebook/wav2vec2-large-xlsr-53"

  # ``architecture`` and ``pretrained_model_name`` can be used to override the
  # automatically selected encoder from the toggles above. Supported
  # architectures: wav2vec2, hubert, wavlm, xlsr.
  architecture: null
  pretrained_model_name: null

  # When ``fine_tune`` is false the encoder is kept frozen and gradients are
  # not computed, allowing the rest of the model to benefit from pretrained
  # representations with negligible overhead. Set to true to update the
  # encoder weights during training.
  fine_tune: false

  # Layer index from which to read hidden states. Negative values follow the
  # Python indexing convention (``-1`` selects the last layer).
  output_layer: -1

  # Optional dimensionality reduction applied on top of the SSL features. Use
  # ``null`` to keep the native hidden size produced by the encoder.
  feature_projection_dim: null

  # Apply LayerNorm to the extracted features (recommended when combining
  # with randomly initialized decoders).
  layer_norm: true

  # Desired sample rate for the encoder. When ``null`` the dataset sample rate
  # will be used. Set this explicitly if the selected checkpoint expects a
  # specific value (e.g. 16000 for most wav2vec2-family models).
  target_sample_rate: null
